name: Gerar Devocionais Automaticamente

on:
  schedule:
    # Roda todo dia às 03:10 UTC (00:10 em Brasília)
    - cron: '10 3 * * *'
  workflow_dispatch: # Permite disparar manualmente

jobs:
  gerar-devocionais:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Disparar geração de devocionais
        run: |
          echo "🚀 Iniciando geração de devocionais..."
          RESPONSE=$(curl -s -X POST https://www.meditarfe.com/api/admin/gerar-devocionais \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -w "\n%{http_code}")

          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Status HTTP: $STATUS"
          echo "Resposta: $BODY"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "✅ Geração iniciada com sucesso!"
            exit 0
          else
            echo "❌ Erro ao gerar devocionais! Status: $STATUS"
            exit 1
          fi
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
